name: VilPickupV
version: '2.3'
# Plugin main class
main: org.jan1k.vilpickup.VilPickupV
# Minecraft API version
api-version: '1.21'
authors: [ Jan1k ]
description: 'Premium villager pickup plugin with NMS and EntitySnapshot support.'
website: 'https://jan1k.org'
prefix: '[jan1k] VilPickup'

commands:
  vilpickup:
    description: 'Main plugin command'
    usage: '/vilpickup reload'
    
permissions:
  vilpickup.use:
    description: 'Allows picking up villagers'
    default: true
  vilpickup.admin:
    description: 'Allows reloading configuration'
    default: op
